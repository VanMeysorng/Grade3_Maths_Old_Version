<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Math Quest: Legendary Challenge | Grade 3 Advanced | 60 Hard Questions | Interactive Boss Battles</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0f172a 50%, #1e1b2f 100%);
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
            position: relative;
        }

        /* Main container */
        .game-wrapper {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Hero header with animated gradient */
        .hero-header {
            background: linear-gradient(135deg, rgba(15, 25, 45, 0.95), rgba(30, 20, 50, 0.95));
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem 2rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 200, 100, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .hero-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hero-title i {
            font-size: 2.5rem;
            color: #ffaa44;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 5px #ffaa44; }
            50% { text-shadow: 0 0 20px #ffaa44; }
        }

        .hero-title h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffaa44, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
        }

        .stats-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(0,0,0,0.6);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: #ffecb3;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffaa44;
        }

        .stat-badge i {
            color: #ffaa44;
        }

        .pdf-btn {
            background: linear-gradient(135deg, #ff6b6b, #ffaa44);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Topic cards with boss battle theme */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 1.8rem;
            margin-bottom: 1.8rem;
        }

        .boss-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 2rem;
            overflow: hidden;
            border: 2px solid rgba(255, 170, 68, 0.5);
            transition: all 0.3s;
            position: relative;
        }

        .boss-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-color: #ffaa44;
        }

        .boss-header {
            background: linear-gradient(135deg, #ff6b6b, #ffaa44);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .boss-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .boss-header-left i {
            font-size: 2rem;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
        }

        .boss-header-left h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .boss-hp {
            background: rgba(0,0,0,0.5);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffaa44;
        }

        .boss-body {
            padding: 1.5rem;
        }

        .question-area {
            background: rgba(255,255,255,0.08);
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }

        .timer-bar {
            background: #2d3748;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ffaa44, #ff6b6b);
            transition: width 0.1s linear;
            border-radius: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffecb3;
            text-align: center;
            margin: 1rem 0;
            line-height: 1.4;
        }

        /* Drag and drop zone */
        .drag-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 1rem 0;
        }

        .drag-item {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 2px solid #ffaa44;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: grab;
            transition: all 0.1s;
            color: white;
            font-size: 1rem;
        }

        .drag-item:active {
            cursor: grabbing;
        }

        .drop-zone {
            background: rgba(255,170,68,0.2);
            border: 2px dashed #ffaa44;
            padding: 15px;
            border-radius: 1rem;
            text-align: center;
            margin: 1rem 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            transition: all 0.2s;
        }

        .drop-zone.drag-over {
            background: rgba(255,170,68,0.4);
            border-color: #ffaa44;
            transform: scale(1.02);
        }

        .drop-answer {
            background: #ffaa44;
            color: #1a202c;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .option-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 1rem 0;
        }

        .option-btn {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 2px solid #ffaa44;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .option-btn:hover:not(:disabled) {
            background: #ffaa44;
            color: #1a202c;
            transform: scale(0.98);
        }

        .option-btn.correct-highlight {
            background: #48bb78;
            border-color: #2f855a;
        }

        .option-btn.wrong-highlight {
            background: #f56565;
            border-color: #c53030;
        }

        .feedback {
            padding: 10px;
            border-radius: 60px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            margin: 10px 0;
        }

        .feedback-correct {
            background: rgba(72, 187, 120, 0.3);
            color: #9ae6b4;
            border-left: 4px solid #48bb78;
        }

        .feedback-wrong {
            background: rgba(245, 101, 101, 0.3);
            color: #feb2b2;
            border-left: 4px solid #f56565;
        }

        .next-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6b6b);
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            color: white;
            font-size: 1rem;
            transition: transform 0.1s;
        }

        .powerup-bar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .powerup {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .powerup:hover {
            background: #ffaa44;
            color: #1a202c;
        }

        .streak-indicator {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 8px;
            color: #ffaa44;
        }

        .completed-badge {
            text-align: center;
            padding: 1rem;
            background: linear-gradient(135deg, #48bb78, #2f855a);
            border-radius: 1rem;
            color: white;
        }

        canvas#epicConfetti {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2000;
        }

        @media (max-width: 800px) {
            .option-buttons { grid-template-columns: 1fr; }
            .drag-item { padding: 8px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="epicConfetti"></canvas>

        let topicsState = {};
        let totalQuestions = 0;
        let globalStreak = 0;
        let bossesDefeated = 0;

        function triggerEpicConfetti() {
            const canvas = document.getElementById('epicConfetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 3,
                    speedY: Math.random() * 6 + 4,
                    speedX: (Math.random() - 0.5) * 4,
                    color: `hsl(${Math.random() * 360}, 80%, 60%)`
                });
            }
            let anim;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                for (let p of particles) {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if (p.y < canvas.height) active = true;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                if (active) anim = requestAnimationFrame(draw);
                else cancelAnimationFrame(anim);
            }
            draw();
            setTimeout(() => cancelAnimationFrame(anim), 2000);
        }

        function updateGlobalStats() {
            let totalEarned = 0;
            let completedTopics = 0;
            for (let tid of ['placevalue', 'rounding', 'addition', 'subtraction']) {
                const state = topicsState[tid];
                const correct = state.answers.filter(a => a.correct).length;
                totalEarned += correct;
                if (correct === state.answers.length) completedTopics++;
            }
            bossesDefeated = completedTopics;
            document.getElementById('totalScore').innerText = totalEarned;
            document.getElementById('bossesDefeated').innerText = bossesDefeated;
            if (bossesDefeated === 4) triggerEpicConfetti();
        }

        function handleAnswer(topicId, selected, isCorrect, btnElement) {
            const state = topicsState[topicId];
            const current = state.answers[state.currentIdx];
            if (current.answered) return;
            
            current.answered = true;
            current.correct = isCorrect;
            
            if (isCorrect) {
                globalStreak++;
                document.getElementById('globalStreak').innerText = globalStreak;
                updateGlobalStats();
                if (state.answers.filter(a => a.correct).length === state.answers.length) {
                    triggerEpicConfetti();
                }
            } else {
                globalStreak = 0;
                document.getElementById('globalStreak').innerText = globalStreak;
            }
            
            renderSingleCard(topicId);
            updateGlobalStats();
        }

        function nextQuestion(topicId) {
            const state = topicsState[topicId];
            if (!state.answers[state.currentIdx].answered) return;
            if (state.currentIdx + 1 < state.answers.length) {
                state.currentIdx++;
                renderSingleCard(topicId);
            } else {
                renderSingleCard(topicId);
            }
        }

        function renderSingleCard(topicId) {
            const cardDiv = document.getElementById(`boss-${topicId}`);
            if (!cardDiv) return;
            const topic = HARD_BANK[topicId];
            const state = topicsState[topicId];
            const total = state.answers.length;
            const answeredCount = state.answers.filter(a => a.answered).length;
            const isComplete = state.answers.every(a => a.answered);
            const correctCount = state.answers.filter(a => a.correct).length;
            
            if (isComplete) {
                cardDiv.innerHTML = `
                    <div class="boss-header">
                        <div class="boss-header-left"><i class="${topic.icon}"></i><h2>${topic.name}</h2></div>
                        <div class="boss-hp"><i class="fas fa-skull"></i> DEFEATED!</div>
                    </div>
                    <div class="boss-body">
                        <div class="completed-badge"><i class="fas fa-trophy"></i> BOSS DEFEATED!<br>Score: ${correctCount}/${total}</div>
                    </div>
                `;
                return;
            }
            
            const current = state.answers[state.currentIdx];
            const q = current.q;
            const progressPercent = (answeredCount / total) * 100;
            
            cardDiv.innerHTML = `
                <div class="boss-header">
                    <div class="boss-header-left"><i class="${topic.icon}"></i><h2>${topic.name}</h2></div>
                    <div class="boss-hp"><i class="fas fa-heart"></i> HP: ${correctCount}/${total}</div>
                </div>
                <div class="boss-body">
                    <div class="progress-bar-container"><div class="topic-progress" style="width: ${progressPercent}%; background:#ffaa44; height:6px;"></div></div>
                    <div class="question-area">
                        <div class="question-text"><i class="fas fa-quote-left"></i> ${q.text}</div>
                        <div class="option-buttons" id="options-${topicId}">
                            ${q.options.map(opt => `<button class="option-btn" data-opt="${opt.replace(/"/g, '&quot;')}">${opt}</button>`).join('')}
                        </div>
                        <div class="feedback" id="feedback-${topicId}">${current.answered ? (current.correct ? '<i class="fas fa-check"></i> +1 point! Streak: ' + globalStreak : '<i class="fas fa-times"></i> Wrong! Correct: ' + q.correct) : '<i class="fas fa-bolt"></i> Answer quickly for streak bonus!'}</div>
                        ${current.answered ? `<button class="next-btn" id="next-${topicId}"><i class="fas fa-arrow-right"></i> Next Challenge</button>` : ''}
                        <div class="streak-indicator"><i class="fas fa-fire"></i> Current Streak: ${globalStreak}x</div>
                    </div>
                </div>
            `;
            
            if (!current.answered) {
                const btns = cardDiv.querySelectorAll('.option-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const selected = btn.getAttribute('data-opt');
                        const isCorrect = (selected === q.correct);
                        handleAnswer(topicId, selected, isCorrect, btn);
                    });
                });
            }
            const nextBtn = cardDiv.querySelector(`#next-${topicId}`);
            if (nextBtn) nextBtn.addEventListener('click', () => nextQuestion(topicId));
        }

        function buildGame() {
            const grid = document.getElementById('bossGrid');
            grid.innerHTML = '';
            for (let tid of ['placevalue', 'rounding', 'addition', 'subtraction']) {
                const card = document.createElement('div');
                card.className = 'boss-card';
                card.id = `boss-${tid}`;
                grid.appendChild(card);
            }
            
            for (let tid of ['placevalue', 'rounding', 'addition', 'subtraction']) {
                const qList = HARD_BANK[tid].questions;
                totalQuestions += qList.length;
                topicsState[tid] = {
                    currentIdx: 0,
                    answers: qList.map(q => ({ q: q, answered: false, correct: false }))
                };
            }
            document.getElementById('totalPossible').innerText = totalQuestions;
            for (let tid of ['placevalue', 'rounding', 'addition', 'subtraction']) {
                renderSingleCard(tid);
            }
        }

        function exportPDF() {
            const wrapper = document.createElement('div');
            wrapper.style.background = 'white';
            wrapper.style.padding = '20px';
            wrapper.innerHTML = `<h1>Math Legend Report</h1><p>Score: ${document.getElementById('totalScore').innerText}/${totalQuestions}</p><p>Bosses Defeated: ${bossesDefeated}/4</p>`;
            html2pdf().set({ margin: 0.5, filename: 'Math_Legend_Report.pdf' }).from(wrapper).save();
        }

        document.getElementById('pdfReportBtn').addEventListener('click', exportPDF);
        buildGame();
    </script>
</body>
