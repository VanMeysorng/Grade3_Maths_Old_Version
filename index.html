<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Grade 3 Math | Complete Curriculum Practice</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body data-theme="dark">
    <canvas id="confettiCanvas"></canvas>
    
    <!-- Theme Modal -->
    <div id="themeModal" class="theme-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="fas fa-palette"></i> Display Settings</h2>
            <div class="theme-options">
                <div class="theme-group">
                    <h3>Choose Theme</h3>
                    <div class="theme-buttons">
                        <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i> Dark Mode</button>
                        <button class="theme-btn" data-theme="light"><i class="fas fa-sun"></i> Light Mode</button>
                        <button class="theme-btn" data-theme="high-contrast"><i class="fas fa-eye"></i> High Contrast</button>
                    </div>
                </div>
            </div>
            <button id="applyThemeBtn" class="apply-theme-btn">Apply Settings</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <div class="math-header">
            <div class="logo-section">
                <i class="fas fa-calculator"></i>
                <div>
                    <h1>Grade 3 Math Mastery</h1>
                    <p>Complete Curriculum • Numbers • Operations • Geometry • Fractions • Data</p>
                </div>
            </div>
            <div class="stats-section">
                <div class="stat-card"><i class="fas fa-star"></i> Score: <span id="totalScore">0</span>/<span id="totalPossible">0</span></div>
                <div class="stat-card"><i class="fas fa-fire"></i> Streak: <span id="streakCount">0</span></div>
                <div class="stat-card"><i class="fas fa-trophy"></i> Mastered: <span id="masteryComplete">0</span>/<span id="totalMastery">17</span></div>
                <button class="pdf-btn" id="pdfReportBtn"><i class="fas fa-file-pdf"></i> Export Report</button>
                <button class="theme-btn-small" id="openThemeModal"><i class="fas fa-palette"></i></button>
            </div>
        </div>

        <!-- Topics Dashboard (17 Topics) -->
        <div class="topics-grid" id="topicsGrid"></div>

        <!-- Active Quiz Arena -->
        <div id="quizArena" class="quiz-arena hidden">
            <div class="arena-header">
                <button class="back-btn" id="closeArenaBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
                <div class="topic-title" id="arenaTitle"></div>
                <div class="progress-info" id="progressInfo"></div>
            </div>
            <div id="quizContent"></div>
        </div>
    </div>

    <script src="js/topics.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
