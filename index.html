<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Math Quest: Boss Rush Academy | Grade 3 Advanced</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body data-theme="dark-boy">
    <canvas id="confettiEpic"></canvas>
    
    <!-- Theme Settings Modal -->
    <div id="themeModal" class="theme-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2><i class="fas fa-palette"></i> Customize Your Adventure</h2>
            <div class="theme-options">
                <div class="theme-group">
                    <h3>Theme Style</h3>
                    <div class="theme-buttons">
                        <button class="theme-btn" data-theme="dark-boy"><i class="fas fa-moon"></i> Dark · Boy</button>
                        <button class="theme-btn" data-theme="dark-girl"><i class="fas fa-moon"></i> Dark · Girl</button>
                        <button class="theme-btn" data-theme="light-boy"><i class="fas fa-sun"></i> Light · Boy</button>
                        <button class="theme-btn" data-theme="light-girl"><i class="fas fa-sun"></i> Light · Girl</button>
                    </div>
                </div>
            </div>
            <button id="applyThemeBtn" class="apply-theme-btn">Apply Theme</button>
        </div>
    </div>

    <div class="game-container">
        <!-- Header -->
        <div class="legend-header">
            <div class="hero-icon">
                <i class="fas fa-dragon"></i>
                <h1>⚡ MATH BOSS RUSH ⚡</h1>
            </div>
            <div class="stats-row">
                <div class="stat-gem"><i class="fas fa-gem"></i> SCORE: <span id="totalScoreSpan">0</span>/<span id="maxScoreSpan">0</span></div>
                <div class="stat-gem"><i class="fas fa-fire"></i> STREAK: <span id="streakGlobal">0</span>x</div>
                <div class="stat-gem"><i class="fas fa-dragon"></i> BOSSES SLAIN: <span id="slainCount">0</span>/4</div>
                <button class="pdf-legend" id="reportPdfBtn"><i class="fas fa-scroll"></i> EPIC REPORT</button>
                <button class="theme-toggle-btn" id="openThemeModal"><i class="fas fa-palette"></i> THEME</button>
            </div>
        </div>

        <!-- Dashboard: All Topics Grid -->
        <div class="dashboard-section">
            <h2 class="dashboard-title"><i class="fas fa-compass"></i> BOSS DASHBOARD</h2>
            <div class="topics-dashboard" id="topicsDashboard">
                <!-- Cards will be populated here -->
            </div>
        </div>

        <!-- Active Battle Arena (only shows when a boss is selected) -->
        <div id="activeArena" class="active-arena hidden">
            <div class="arena-header">
                <button id="closeArenaBtn" class="close-arena-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
                <div class="arena-boss-name" id="arenaBossName"></div>
            </div>
            <div id="dynamicArena"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
